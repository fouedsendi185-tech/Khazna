<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مركبة الفؤاد V5.2 الذكية ⚜️</title>
<style>
:root{--gold:#FFD700;--dark:#000}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--dark);color:var(--gold);font-family:system-ui;min-height:100vh}
.header{padding:20px;text-align:center;border-bottom:1px solid #333}
.header h1{font-size:2rem;text-shadow:0 0 15px var(--gold)}
.store-btn{position:fixed;bottom:20px;left:20px;background:var(--gold);color:#000;width:60px;height:60px;border-radius:18px;border:none;font-size:2rem;box-shadow:0 0 20px var(--gold);cursor:pointer;z-index:999}
.apps-modal{position:fixed;inset:0;background:#000e;display:none;z-index:1000}
.apps-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:15px;padding:20px;max-width:600px;margin:80px auto}
.app-card{background:#111;border:1px solid #333;border-radius:15px;padding:20px;text-align:center;cursor:pointer}
.app-card:hover{border-color:var(--gold);box-shadow:0 0 15px #FFD70040}
.chat-box{max-width:700px;margin:20px auto;padding:20px}
.msg{background:#111;padding:15px;border-radius:12px;margin:10px 0;border-right:3px solid var(--gold)}
.input-row{display:flex;gap:10px;max-width:700px;margin:20px auto;padding:0 20px}
input{flex:1;background:#111;border:1px solid #333;color:var(--gold);padding:12px;border-radius:10px;font-size:1rem}
button{background:var(--gold);color:#000;border:none;padding:12px 20px;border-radius:10px;font-weight:bold;cursor:pointer}
.close-btn{position:fixed;top:20px;left:20px;background:#333;color:var(--gold);width:40px;height:40px;border-radius:50%;border:none;font-size:1.5rem}
</style>
</head>
<body>

<div class="header">
  <h1 id="site-title">⚜️ مركبة الفؤاد V5.2 ⚜️</h1>
  <p id="site-desc">المنظومة الذكية للتحديث عن بعد</p>
</div>

<div class="chat-box" id="chat">
  <div class="msg">مرحبا فؤاد. أنا الذكاء المدمج. اطلب مني أي شيء.</div>
</div>

<div class="input-row">
  <input id="userInput" placeholder="اكتب أمرك هنا...">
  <button onclick="sendMsg()">إرسال</button>
</div>

<button class="store-btn" onclick="toggleStore()">⚜️</button>

<div class="apps-modal" id="store">
  <button class="close-btn" onclick="toggleStore()">×</button>
  <div class="apps-grid" id="appsGrid"></div>
</div>

<script>
// ⚜️ هذا الجزء الوحيد اللي تعدله بعدين - فقط هذا ⚜️
const CONFIG = {
  title: "⚜️ مركبة الفؤاد V5.2 ⚜️",
  desc: "المنظومة الذكية للتحديث عن بعد",
  apps: [
    {name:"الحاسبة الملكية",icon:"🧮",action:"alert('الحاسبة شغالة')"},
    {name:"مولد الأسماء",icon:"✨",action:"alert('مولد الأسماء جاهز')"},
    {name:"الخزنة",icon:"🔐",action:"alert('الخزنة مغلقة')"},
    {name:"المفكرة",icon:"📝",action:"alert('المفكرة الملكية')"}
  ],
  aiReplies: {
    "مرحبا":"أهلا يا ملك فؤاد ⚜️",
    "كيف حالك":"بأفضل حال مادمت أنت بخير",
    "default":"تم استلام أمرك. جاري التنفيذ يا فؤاد..."
  }
};
// لا تلمس شي تحت هذا الخط إلا إذا تبي تطور
document.getElementById('site-title').innerText = CONFIG.title;
document.getElementById('site-desc').innerText = CONFIG.desc;

function toggleStore(){
  const s = document.getElementById('store');
  s.style.display = s.style.display==='block'? 'none' : 'block';
  loadApps();
}

function loadApps(){
  const grid = document.getElementById('appsGrid');
  grid.innerHTML = CONFIG.apps.map(app => `
    <div class="app-card" onclick="${app.action}">
      <div style="font-size:2.5rem">${app.icon}</div>
      <div style="margin-top:10px">${app.name}</div>
    </div>
  `).join('');
}

function sendMsg(){
  const input = document.getElementById('userInput');
  const chat = document.getElementById('chat');
  const text = input.value.trim();
  if(!text) return;
  chat.innerHTML += `<div class="msg">أنت: ${text}</div>`;
  let reply = CONFIG.aiReplies.default;
  for(let key in CONFIG.aiReplies){
    if(text.includes(key)) reply = CONFIG.aiReplies[key];
  }
  setTimeout(()=>{
    chat.innerHTML += `<div class="msg">الذكاء: ${reply}</div>`;
    chat.scrollTop = chat.scrollHeight;
  },500);
  input.value='';
}
</script>

</body>
</html>
